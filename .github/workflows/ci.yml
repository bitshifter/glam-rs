name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - run: rustup update --no-self-update stable
      - run: rustup default stable

      - name: cargo ci lints
        run: cargo run -p ci -- lints

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta, nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup update --no-self-update ${{ matrix.toolchain }}
      - run: rustup default ${{ matrix.toolchain }}
      - run: cargo run -p ci -- test-features

  check-msrv:
    name: Check MSRV
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [1.68.2]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup update --no-self-update ${{ matrix.toolchain }}
      - run: rustup default ${{ matrix.toolchain }}
      - run: ./build_all_msrv.sh
        shell: bash

  test-core-simd:
    name: Test portable simd
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [nightly]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup update --no-self-update ${{ matrix.toolchain }}
      - run: rustup default ${{ matrix.toolchain }}
      - run: cargo test --features core-simd
        shell: bash

  test-wasm32:
    name: Test wasm32
    strategy:
      matrix:
        toolchain: [stable]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - run: ./build_and_test_wasm32_node.sh
      - run: ./build_and_test_wasm32_firefox.sh
      - run: ./build_and_test_wasm32_chrome.sh

  test-wasm64:
    name: Test wasm64
    strategy:
      matrix:
        toolchain: [nightly]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add rust-src --toolchain ${{ matrix.toolchain }}
      - uses: bytecodealliance/actions/wasmtime/setup@v1
      - run: ./build_and_test_wasm64.sh
